#####################
### SUBMAP MENUS ###
#####################

# Rofi submaps - Chain binding using submap
bind = $mainMod ALT, Space, submap, rofi_menus
submap = rofi_menus

bind = , a, exec, ~/.config/.settings/audio_menu.sh
bind = , a, submap, reset

bind = , m, exec, ~/.config/.settings/microphone_menu.sh
bind = , m, submap, reset

bind = , b, exec, ~/.config/.settings/bluetooth_menu.sh
bind = , b, submap, reset

bind = , c, exec, ~/.config/.settings/clipboard-wayland.sh
bind = , c, submap, reset

bind = , v, exec, ~/.config/.settings/vpn_menu.sh
bind = , v, submap, reset

bind = , w, exec, ~/.config/.settings/wifi_menu.sh
bind = , w, submap, reset

# Escape from submap
bind = , escape, submap, reset
bind = , catchall, submap, reset

submap = reset

# IDE submap - Super + c, then 1/2/3/4
bind = SUPER, c, submap, ide

submap = ide

bind = , 1, exec, ~/.config/.settings/ide.sh
bind = , 1, submap, reset

bind = , 2, exec, ~/.config/.settings/ide-alt.sh
bind = , 2, submap, reset

bind = , 3, exec, cursor
bind = , 3, submap, reset

bind = , 4, exec, ~/.config/.settings/editor.sh
bind = , 4, submap, reset

bind = , escape, submap, reset

submap = reset

# Group submap - Super + W
bind = $mainMod, W, submap, group

submap = group

# Toggle group on active window (create/destroy group)
bind = , g, togglegroup,
bind = , g, submap, reset

# Smart move: into neighbor group if one exists, out of group if pressing toward
# nothing while in a group, otherwise behaves as movewindow.
bind = , j, movewindoworgroup, l
bind = , j, submap, reset

bind = , k, movewindoworgroup, d
bind = , k, submap, reset

bind = , l, movewindoworgroup, u
bind = , l, submap, reset

bind = , semicolon, movewindoworgroup, r
bind = , semicolon, submap, reset

# Move out of group (Detach) - only works if active window is in a group
bind = , d, moveoutofgroup, active
bind = , d, submap, reset

# Lock group
bind = , w, lockactivegroup, toggle
bind = , w, submap, reset

# Exit submap
bind = , escape, submap, reset

submap = reset
