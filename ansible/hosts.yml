---
# Personal inventory. Real hosts only; empty groups are acceptable but
# every group here must gate actual behavior in site.yml.
#
# Hierarchy reflects semantic relationships:
#
#   all
#   ├── linux        (every Linux host)
#   │   ├── arch     (Arch/Garuda package implementation)
#   │   ├── hyprland (Wayland/Hyprland desktop profile; Linux only)
#   │   ├── i3       (i3 desktop profile; Linux only)
#   │   └── gaming   (optional gaming packages; Linux only today)
#   └── darwin       (every macOS host)
#
# A Hyprland host is therefore also in `linux` automatically. Profile
# group vars still apply host-by-host, and role aggregation checks
# group_names explicitly so a host that is in `arch` but not `hyprland`
# does not pick up Hyprland packages.
#
# Shared behavior lives in group_vars/<group>.yml.
# Host-specific values live in host_vars/<hostname>.yml.
# Sample host_vars for future hosts live in docs/ONBOARDING.md.

all:
  children:
    linux:
      children:
        arch:
          hosts:
            alfred:
        hyprland:
          hosts:
            alfred:
        i3:
          hosts:
            alfred:
        gaming:
          hosts:
            alfred:

    darwin:
      # TODO: enable the Mac host after onboarding.
      #
      # Activation steps:
      #   1. Rename host_vars/mac-placeholder.yml to host_vars/<hostname>.yml.
      #   2. Fill in TODO fields in that file (primary_user, etc.).
      #   3. Uncomment the host block below and replace `mac-placeholder`
      #      with your hostname.
      #   4. Optionally trim darwin_apps in group_vars/darwin.yml.
      #   5. Run: ansible-playbook ... --limit <hostname> --check --tags packages
      #
      # hosts:
      #   mac-placeholder:
      hosts: {}
