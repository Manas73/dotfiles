---
# Personal inventory.
#
# The inventory is intentionally minimal: hosts are grouped only by OS
# family. Desktop profiles (Hyprland, i3) and feature toggles (gaming) are
# declared per-host in host_vars/<hostname>.yml via the `profiles:` list,
# not via inventory group membership. This avoids the dual-truth problem
# where adding a host to Hyprland requires editing both hosts.yml and
# host_vars.
#
# Hierarchy:
#
#   all
#   ├── linux     (every Linux host)
#   │   └── arch  (Arch/Garuda)
#   └── darwin    (every macOS host)
#
# Shared OS-level behavior lives in group_vars/<group>.yml.
# Per-host capabilities (profiles, primary_user, feature flags) live in
# host_vars/<hostname>.yml.
# Profile package lists live in group_vars/all/profiles.yml.

all:
  children:
    linux:
      children:
        arch:
          hosts:
            alfred:

    darwin:
      # TODO: enable the Mac host after onboarding.
      #
      # Activation steps:
      #   1. Rename host_vars/mac-placeholder.yml to host_vars/<hostname>.yml.
      #   2. Fill in TODO fields in that file (primary_user, etc.).
      #   3. Uncomment the host block below and replace `mac-placeholder`
      #      with your hostname.
      #   4. Run: ansible-playbook ... --limit <hostname> --check --tags packages
      #
      # hosts:
      #   mac-placeholder:
      hosts: {}
