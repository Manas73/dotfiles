---
# OS package installation only.
# Role bodies land in chezmoi-a2q (Arch/AUR) and chezmoi-7tw (Homebrew).

- name: Install Arch pacman packages
  hosts: arch
  become: true
  gather_facts: true
  tags: [packages, arch]
  roles:
    - role: arch_packages

- name: Install AUR packages
  hosts: arch
  become: false
  gather_facts: true
  tags: [packages, aur, arch]
  roles:
    - role: aur_packages

- name: Install macOS Homebrew packages
  hosts: darwin
  become: false
  gather_facts: true
  tags: [packages, darwin]
  roles:
    - role: darwin_packages

- name: Install development profile packages
  hosts: development
  gather_facts: true
  tags: [packages, development]
  roles:
    - role: development

- name: Install gaming profile packages
  hosts: gaming
  gather_facts: true
  tags: [packages, gaming]
  roles:
    - role: gaming
      when: gaming_enabled | default(false) | bool
