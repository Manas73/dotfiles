---
# Full machine provisioning.
#
# Run examples:
#   ansible-playbook -i inventories/personal/hosts.yml playbooks/site.yml --limit alfred --ask-become-pass
#   ansible-playbook ... --tags packages
#   ansible-playbook ... --tags system
#   ansible-playbook ... --tags dotfiles
#
# Roles are added to plays only after they have real task bodies.
# Tracking:
#   chezmoi-a2q  arch_packages, aur_packages
#   chezmoi-7tw  darwin_packages
#   chezmoi-hoz  fish, docker, kanata, plasma_custom_wm
#   chezmoi-c7u  hyprland, i3
#   chezmoi-g19  chezmoi
#
# Intentionally no placeholder plays while roles are empty; running this
# playbook today simply does nothing, which is the correct behavior.

- name: Render Chezmoi config and apply dotfiles
  hosts: all
  gather_facts: true
  tags: [dotfiles, chezmoi]
  roles: []
