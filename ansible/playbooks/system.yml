---
# System-level setup: login shell, services, groups, udev rules, session integration.
# Role bodies land in chezmoi-hoz.

- name: Ensure Fish is the login shell
  hosts: all
  gather_facts: true
  tags: [system, fish]
  roles:
    - role: fish

- name: Configure Docker for the current user
  hosts: all
  gather_facts: true
  tags: [system, docker]
  roles:
    - role: docker
      when: docker_enabled | default(false) | bool

- name: Configure Kanata keyboard remapper
  hosts: linux
  gather_facts: true
  tags: [system, kanata]
  roles:
    - role: kanata
      when: kanata_enabled | default(false) | bool

- name: Configure Plasma with custom window manager
  hosts: linux
  gather_facts: true
  tags: [system, plasma]
  roles:
    - role: plasma_custom_wm
      when:
        - plasma_window_manager is defined
        - plasma_window_manager | length > 0
