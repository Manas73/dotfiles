---
# Hyprland profile package intent.
#
# Logical app names installed by the packages orchestrator when a host
# is in the hyprland group. Linux-only today; if the Mac ever runs a
# Hyprland profile (unlikely) the catalog would gain darwin: entries.
#
# Source of record: this file (replaces the prior hyprland_pacman_packages
# / hyprland_aur_packages / hyprland_multilib_packages variables).

hyprland_apps:
  # AUR (catalog routes to provider: aur).
  - waybar-git

  # Pacman passthrough (no catalog entry needed).
  - awww
  - copyq
  - hypridle
  - hyprland
  - hyprlock
  - hyprsunset
  - nwg-look
  - pipewire
  - polkit-gnome
  - qt5-wayland
  - qt6-wayland
  - rofi-wayland
  - swaync
  - swayosd
  - udiskie
  - uwsm
  - wl-clip-persist
  - wl-clipboard
  - wtype
  - xdg-desktop-portal-hyprland
