---
# Profile package intent.
#
# Consumed by the packages orchestrator. A host opts into a profile by
# listing its name in `profiles:` in host_vars. The orchestrator looks up
# `profile_apps[<name>]` for each entry and feeds the union (after catalog
# resolution) to the matching provider roles.
#
# Profiles are NOT inventory groups in hosts.yml. Membership is declared in
# host_vars, so there is a single source of truth per host. Removing a
# profile from a host is one edit, not two.
#
# Layer 1 (intent) data; complements arch_apps / darwin_apps. Replaces the
# prior group_vars/{hyprland,i3,gaming}.yml files.

profile_apps:

  hyprland:
    # AUR (catalog routes to provider: aur).
    - waybar-git
    # Pacman passthrough (no catalog entry needed).
    - awww
    - copyq
    - hypridle
    - hyprland
    - hyprlock
    - hyprsunset
    - nwg-look
    - pipewire
    - polkit-gnome
    - qt5-wayland
    - qt6-wayland
    - rofi-wayland
    - swaync
    - swayosd
    - udiskie
    - uwsm
    - wl-clip-persist
    - wl-clipboard
    - wtype
    - xdg-desktop-portal-hyprland

  i3:
    - feh
    - i3-wm
    - libxcb
    - picom
    - polybar
    - python-i3ipc
    - rofi-calc
    - rofi-emoji
    - rofi-greenclip
    - rofi-wayland
    - xcb-util-cursor

  gaming:
    # steam ships from the pacman multilib repo; catalog routes to
    # provider: pacman (multilib is a repo, not a separate manager).
    - lutris
    - steam
    - umu-launcher
