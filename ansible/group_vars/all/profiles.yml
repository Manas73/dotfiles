---
# Profile package intent.
#
# Consumed by the packages orchestrator. A host opts into a profile by
# listing its name in `profiles:` in host_vars. The orchestrator looks up
# `profile_apps[<name>]` for each entry and feeds the union (after catalog
# resolution) to the matching provider roles.
#
# Profiles are NOT inventory groups in hosts.yml. Membership is declared in
# host_vars, so there is a single source of truth per host. Removing a
# profile from a host is one edit, not two.
#
# Layer 1 (intent) data; complements arch_apps / darwin_apps. Replaces the
# prior group_vars/{hyprland,i3,gaming}.yml files.

profile_apps:

  # Cross-platform CLI tools and language runtimes. Every entry installs
  # via default-provider passthrough on both OSes (pacman on arch, brew
  # on darwin) under the same logical name -- with one catalog-routed
  # exception, lazydocker, which routes to provider: aur on arch and
  # falls through to brew on darwin.
  #
  # Opt in by adding `cli` to `profiles:` in host_vars. Intended baseline
  # for any developer machine regardless of OS.
  cli:
    - atuin
    - bat
    - btop
    - bun
    - chezmoi
    - eza
    - fastfetch
    - fd
    - fish
    - fzf
    - gcc
    - ghq
    - git
    - git-filter-repo
    - gnupg
    - go
    - hugo
    - jq
    - lazydocker
    - lazygit
    - moreutils
    - neovim
    - nodejs
    - pre-commit
    - python
    - starship
    - television
    - yazi
    - zellij
    - zoxide

  # Cloud / DevOps CLIs. Cross-OS via the catalog: each entry has both
  # arch (AUR) and darwin (brew / cask) routings.
  cloud:
    - aws-cli
    - aws-session-manager-plugin
    - cloud-sql-proxy
    - google-cloud-cli

  # Font set. Linux-only as a profile because the ttf-* logical names map
  # cleanly to pacman / AUR but not to brew formulae. macOS hosts that want
  # the same fonts should use homebrew-cask-fonts directly.
  fonts:
    - ttf-dejavu
    - ttf-droid
    - ttf-fira-code
    - ttf-fira-sans
    - ttf-firacode-nerd
    - ttf-jetbrains-mono-nerd
    - ttf-material-design-icons
    - ttf-material-icons
    - ttf-ms-fonts
    - ttf-nerd-fonts-symbols
    - ttf-nerd-fonts-symbols-common
    - ttf-noto-nerd
    - ttf-vista-fonts

  gaming:
    - lutris
    - steam
    - umu-launcher

  hyprland:
    - waybar
    - awww
    - copyq
    - hypridle
    - hyprland
    - hyprlock
    - hyprsunset
    - nwg-look
    - pipewire
    - polkit-gnome
    - qt5-wayland
    - qt6-wayland
    - rofi-wayland
    - swaync
    - swayosd
    - udiskie
    - uwsm
    - wl-clip-persist
    - wl-clipboard
    - wtype
    - xdg-desktop-portal-hyprland

  i3:
    - feh
    - i3-wm
    - libxcb
    - picom
    - polybar
    - python-i3ipc
    - rofi-calc
    - rofi-emoji
    - rofi-greenclip
    - rofi-wayland
    - xcb-util-cursor

  # KDE Plasma desktop integration. Linux-only; no Mac analogue.
  kde:
    - dolphin
    - dolphin-plugins
    - gwenview
    - kcharselect
    - plasma-x11-session
    - plasma5-integration
