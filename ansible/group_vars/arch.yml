---
# Arch/Garuda package intent.
#
# Layer 1 of the four-layer package model. Single list of logical
# application names. Resolved by roles/packages (orchestrator) against
# group_vars/all/package_catalog.yml, then dispatched to provider_pacman
# or provider_aur as the catalog dictates. Names not in the catalog fall
# through to the default provider for arch (pacman).
#
# Scope: Arch-specific packages only. Cross-platform CLI tools and
# runtimes live in the `cli` profile (group_vars/all/profiles.yml);
# alfred opts in via `profiles: [..., cli]` in host_vars.

arch_apps:
  # ----------------------------------------------------------------
  # Cross-OS apps & bundles (catalog handles routing per OS).
  # ----------------------------------------------------------------
  - "1password"        # catalog -> arch aur, darwin cask
  - docker             # catalog bundle -> docker-engine + buildx + compose
  - dropbox            # catalog -> arch aur, darwin cask
  - firefox            # catalog -> arch pacman, darwin cask
  - google-chrome      # catalog -> arch aur, darwin cask
  - slack              # catalog -> arch aur (slack-desktop), darwin cask
  - vivaldi            # catalog -> arch pacman (+ codecs), darwin cask
  - vlc                # catalog -> arch pacman (+ plugins-all), darwin cask
  - zoom               # catalog -> arch aur, darwin cask

  # ----------------------------------------------------------------
  # Arch-only AUR (catalog routes via provider: aur).
  # ----------------------------------------------------------------
  - aws-cli-v2
  - aws-session-manager-plugin
  - bazecor
  - beads-git
  - cloud-sql-proxy
  - datagrip
  - datagrip-jre
  - epson-inkjet-printer-escpr2
  - fresh-editor-bin
  - gitkraken
  - google-cloud-cli
  - kanata-bin
  - masterpdfeditor
  - matugen-bin
  - mysql
  - onlyoffice-bin
  - opencode-bin
  - pacseek
  - postman-bin
  - pycharm
  - python-screeninfo
  - rambox-pro-bin
  - redshift
  - selectdefaultapplication-git
  - sublime-text-4
  - ttf-material-design-icons-git
  - ttf-material-icons-git
  - ttf-ms-fonts
  - ttf-vista-fonts
  - webstorm
  - webstorm-jre

  # ----------------------------------------------------------------
  # Arch-only pacman (no catalog entry -> default provider: pacman).
  # Linux desktop / system / fonts that have no cross-platform analogue
  # or use a different package name on Mac. Cross-platform CLI tools
  # moved to the `cli` profile.
  # ----------------------------------------------------------------
  - alacritty
  - dolphin
