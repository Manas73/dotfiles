---
# Gaming profile package intent.
#
# Logical app names installed by the packages orchestrator when a host
# is in the gaming group AND gaming_enabled is true.
#
# steam ships from the pacman multilib repo (not a separate provider;
# multilib is a repo, not a manager). The multilib repo must be enabled
# in /etc/pacman.conf for steam to install.
#
# Source of record: this file (replaces the prior gaming_pacman_packages
# / gaming_aur_packages / gaming_multilib_packages variables).

gaming_apps:
  - lutris
  - steam            # catalog -> provider: pacman (multilib repo)
  - umu-launcher     # catalog -> provider: aur
