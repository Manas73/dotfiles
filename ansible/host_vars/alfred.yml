---
# Current Linux workstation (Garuda/Arch).
# Host-specific values only. Shared behavior lives in group_vars.

ansible_connection: local
ansible_python_interpreter: /usr/bin/python

primary_user: ms-garuda

# Chezmoi intent for this host. The chezmoi role (Beads chezmoi-g19)
# renders ~/.config/chezmoi/chezmoi.toml from these values.
chezmoi_email: "manas.sambare@gmail.com"
chezmoi_profile: "personal"
chezmoi_osid: "linux-arch"
chezmoi_gpu: "nvidia"
chezmoi_window_manager:
  - i3
  - hyprland
chezmoi_plasma_window_manager: "i3"

# Machine capabilities. Linux-specific; omit on macOS hosts.
gpu_vendor: "nvidia"
window_managers:
  - i3
  - hyprland
plasma_window_manager: "i3"

# Profile membership. Single source of truth for which package profiles
# this host opts into. Each name resolves against profile_apps in
# group_vars/all/profiles.yml.
profiles:
  - i3
  - hyprland
  - gaming

# Feature flags.
docker_enabled: true
kanata_enabled: true
