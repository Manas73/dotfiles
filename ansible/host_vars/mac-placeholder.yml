---
# macOS host placeholder. Rename this file and the inventory entry to the
# real hostname before first run.
#
# Onboarding checklist:
#   1. Rename this file to match the inventory key in hosts.yml.
#   2. Set ansible_host if running ansible from a different machine.
#      ansible_connection: local is inherited from group_vars/all/main.yml
#      for a bootstrap-on-the-Mac flow.
#   3. Replace primary_user with your macOS username.
#   4. Fill in email / profile / osid for the chezmoi template.
#   5. Override provider_brew_path if you're on Intel mac.
#   6. Optional: trim darwin_apps in group_vars/darwin.yml to taste.

ansible_python_interpreter: /usr/bin/python3

# TODO: set this to your macOS username.
primary_user: TODO

# Chezmoi inventory data.
email: "manas.sambare@gmail.com"
profile: "personal"
osid: "darwin"
gpu: "none"

# Profile membership. The `cli` profile pulls in the cross-platform
# baseline (atuin, bat, fish, neovim, git, go, ...). macOS hosts
# typically don't need the Linux desktop or gaming profiles.
profiles:
  - cli

# Feature flags. macOS-default values; flip per machine.
docker_enabled: false   # Docker Desktop on Mac is a separate install
kanata_enabled: false   # Kanata on macOS needs different setup; defer

# Homebrew location. Apple Silicon default; override to /usr/local/bin/brew
# on Intel.
# provider_brew_path: /usr/local/bin/brew
# provider_cask_brew_path: /usr/local/bin/brew
