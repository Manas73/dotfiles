---
# i3 profile package intent.
#
# Logical app names installed by the packages orchestrator when a host
# is in the i3 group. Linux-only.
#
# Source of record: this file (replaces the prior i3_pacman_packages /
# i3_aur_packages / i3_multilib_packages variables).

i3_apps:
  - feh
  - i3-wm
  - libxcb
  - picom
  - polybar
  - python-i3ipc
  - rofi-calc
  - rofi-emoji
  - rofi-greenclip
  - rofi-wayland
  - xcb-util-cursor
