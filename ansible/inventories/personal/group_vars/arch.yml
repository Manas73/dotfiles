---
# Arch/Garuda package lists.
#
# Consumed by the arch_packages and aur_packages roles (Beads chezmoi-a2q).
# Package roles concatenate the vars contributed by every group the host
# belongs to. Profile-specific lists live in hyprland.yml, i3.yml,
# gaming.yml, etc.
#
# Schema:
#   arch_pacman_packages    packages installed via pacman (official repos)
#   arch_aur_packages       packages installed via yay (AUR)
#   arch_multilib_packages  packages from the multilib repo (e.g. steam deps)
#
# Source of record: this file. The old .chezmoidata/packages/linux/arch/*.yaml
# are deprecated (kept only until chezmoi-xe2 removes the scripts that
# reference them).

