---
# Personal inventory. Real hosts only; empty groups are acceptable but
# every group here must gate actual behavior in site.yml.
#
# Groups:
#   all        universal intent (Chezmoi, dotfiles).
#   linux      Linux-only behavior.
#   darwin     macOS-only behavior.
#   arch       Arch/Garuda package implementation.
#   hyprland   Hyprland ecosystem packages.
#   i3         i3 ecosystem packages.
#   gaming     optional gaming packages (enabled per-host via gaming_enabled).
#
# More groups can be added when they gate a real task. Until then, YAGNI.
# Shared behavior lives in group_vars/<group>.yml.
# Host-specific values live in host_vars/<hostname>.yml.
# Sample host_vars for future hosts live in docs/ONBOARDING.md.

all:
  children:
    linux:
      children:
        arch:
          hosts:
            alfred:

    darwin:
      hosts: {}

    hyprland:
      hosts:
        alfred:

    i3:
      hosts:
        alfred:

    gaming:
      hosts:
        alfred:
