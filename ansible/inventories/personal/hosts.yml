---
# Personal inventory for all managed machines.
#
# Grouping rules:
#   - all:           truly universal intent (dotfiles, cross-platform tools).
#   - linux:         all Linux systems.
#   - darwin:        all macOS systems.
#   - arch:          Arch/Garuda-specific package implementation.
#   - desktop:       graphical desktop machines.
#   - workstations:  desktop-class machines.
#   - laptops:       portable machines.
#   - development:   machines used for software development.
#   - hyprland:      machines running Hyprland.
#   - i3:            machines running i3.
#   - gaming:        optional gaming packages.
#   - personal/work: profile-specific behavior.
#
# Host-specific values live in host_vars/<hostname>.yml.
# Shared package/config intent lives in group_vars/<group>.yml.

all:
  children:
    linux:
      children:
        arch:
          hosts:
            alfred:
            # future-linux-laptop:  # Uncomment when the machine exists.

    darwin:
      hosts:
        # future-macbook:           # Uncomment when the machine exists.

    desktop:
      hosts:
        alfred:

    workstations:
      hosts:
        alfred:

    laptops:
      hosts:
        # future-linux-laptop:
        # future-macbook:

    development:
      hosts:
        alfred:
        # future-linux-laptop:
        # future-macbook:

    hyprland:
      hosts:
        alfred:
        # future-linux-laptop:

    i3:
      hosts:
        alfred:

    gaming:
      hosts:
        alfred:

    personal:
      hosts:
        alfred:
        # future-linux-laptop:
        # future-macbook:
