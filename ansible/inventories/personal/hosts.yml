---
# Personal inventory.
#
# Only real, currently-managed hosts belong here. Placeholder host vars for
# future machines live in examples/host_vars/ and are onboarded by copying
# them into host_vars/ and adding the host to the relevant groups below.
#
# Grouping rules:
#   - all:           truly universal intent (dotfiles, cross-platform tools).
#   - linux:         all Linux systems.
#   - darwin:        all macOS systems.
#   - arch:          Arch/Garuda-specific package implementation.
#   - desktop:       graphical desktop machines.
#   - workstations:  desktop-class machines.
#   - laptops:       portable machines.
#   - development:   machines used for software development.
#   - hyprland:      machines running Hyprland.
#   - i3:            machines running i3.
#   - gaming:        optional gaming packages.
#   - personal:      personal-profile hosts.
#   - work:          work-profile hosts.
#
# Host-specific values live in host_vars/<hostname>.yml.
# Shared package/config intent lives in group_vars/<group>.yml.

all:
  children:
    linux:
      children:
        arch:
          hosts:
            alfred:

    darwin:
      hosts: {}

    desktop:
      hosts:
        alfred:

    workstations:
      hosts:
        alfred:

    laptops:
      hosts: {}

    development:
      hosts:
        alfred:

    hyprland:
      hosts:
        alfred:

    i3:
      hosts:
        alfred:

    gaming:
      hosts:
        alfred:

    personal:
      hosts:
        alfred:

    work:
      hosts: {}
