---
# Example host vars for a future Arch/Garuda Linux laptop.
#
# This file is intentionally outside the active host_vars/ directory.
# To onboard this machine:
#   1. Move this file into host_vars/ and rename it to the real hostname.
#   2. Update values below for the actual machine.
#   3. Add the host to the relevant groups in hosts.yml (linux -> arch,
#      laptops, development, hyprland, personal).
#
# Host vars must stay minimal. Shared behavior belongs in group_vars.

primary_user: manas

# Chezmoi intent. Consumed by the future chezmoi role (Beads chezmoi-g19)
# to render ~/.config/chezmoi/chezmoi.toml.
chezmoi_email: "manas.sambare@gmail.com"
chezmoi_profile: "personal"
chezmoi_osid: "linux-arch"
chezmoi_gpu: "amd"
chezmoi_window_manager:
  - hyprland
chezmoi_plasma_window_manager: "kwin"

# Machine capabilities.
gpu_vendor: "amd"
window_managers:
  - hyprland
plasma_window_manager: "kwin"

# Feature flags.
docker_enabled: true
kanata_enabled: true
gaming_enabled: false
